<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 140" role="img" aria-label="Breathly — Ancient wisdom · Modern science">
  <title>Breathly</title>

  <!-- ─── Mark (geometry half-scaled, positioned at (20,20)–(120,120), centre (70,70)) ─── -->

  <!-- Inner downward triangle: very subtle teal fill -->
  <polygon points="57.5,70 82.5,70 70,91.651"
           fill="#4ECDC4" fill-opacity="0.10" />

  <!-- Vesica piscis: two overlapping circles, warm gold -->
  <circle cx="57.5" cy="70" r="25" fill="none" stroke="#F7B731" stroke-width="1" />
  <circle cx="82.5" cy="70" r="25" fill="none" stroke="#F7B731" stroke-width="1" />

  <!-- Outer containing circle: teal -->
  <circle cx="70" cy="70" r="45" fill="none" stroke="#4ECDC4" stroke-width="1.25" />

  <!-- ─── Wordmark ─── -->

  <text x="150" y="82"
        fill="#4ECDC4"
        style="font: 600 44px 'Helvetica Neue', Helvetica, Arial, sans-serif; letter-spacing: -0.5px;">Breathly</text>

  <!-- Subtitle: tracked-out gold caps -->
  <text x="152" y="106"
        fill="#F7B731"
        style="font: 500 10px 'Helvetica Neue', Helvetica, Arial, sans-serif; letter-spacing: 2.8px;">ANCIENT WISDOM · MODERN SCIENCE</text>
</svg>
